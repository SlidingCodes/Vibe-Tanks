services:
  server:
    image: ${SERVER_IMAGE}:${IMAGE_TAG:-release}
    expose:
      - "3001"
    restart: unless-stopped
    # The admin dashboard is gated by ADMIN_TOKEN. Set it in the deploy
    # host's `.env` (alongside SERVER_IMAGE / WEB_IMAGE / DOMAIN). When
    # unset, every /admin/* request returns 503 — fail-closed.
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/healthz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    image: ${WEB_IMAGE}:${IMAGE_TAG:-release}
    depends_on:
      server:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
