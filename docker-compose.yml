services:
  server:
    image: ${SERVER_IMAGE}:${IMAGE_TAG:-release}
    # 3001 = public socket.io. 3010 = internal control plane consumed
    # by the admin sidecar over the docker network. Neither port is
    # mapped to the host: only Caddy (web) speaks 3001 publicly, and
    # only the admin container speaks 3010.
    expose:
      - "3001"
      - "3010"
    restart: unless-stopped
    # INTERNAL_TOKEN gates the /internal/* surface. Must match the
    # value set on the admin container; if unset, every internal
    # request 503s — fail-closed.
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/healthz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  admin:
    image: ${ADMIN_IMAGE}:${IMAGE_TAG:-release}
    depends_on:
      server:
        condition: service_healthy
    expose:
      - "3002"
    restart: unless-stopped
    # ADMIN_TOKEN gates the dashboard's public surface (login + /api/*).
    # INTERNAL_TOKEN is forwarded to the game server in the X-Internal-
    # Token header. GAME_INTERNAL_URL points at the in-network game host.
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-}
      GAME_INTERNAL_URL: http://server:3010
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002/healthz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    image: ${WEB_IMAGE}:${IMAGE_TAG:-release}
    depends_on:
      server:
        condition: service_healthy
      admin:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
