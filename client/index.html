<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Tanks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #hud {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; font-family: monospace; color: #fff;
    }
    #hud > * { pointer-events: auto; }
    #crosshair {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 28px; opacity: 0.7; pointer-events: none;
    }
    #health-bar {
      position: absolute; top: 20px; left: 20px;
      font-size: 14px; text-shadow: 0 0 6px #000;
    }
    #scoreboard {
      position: absolute; top: 20px; right: 20px;
      font-size: 14px; text-align: right; text-shadow: 0 0 6px #000;
    }
    #cooldown-bar {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px;
      pointer-events: none;
    }
    #cooldown-fill {
      height: 100%; width: 100%; background: #4f4; border-radius: 3px;
      transition: width 0.05s linear;
    }
    #controls-hint {
      position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
      font-size: 12px; opacity: 0.5; pointer-events: none;
    }
    #waiting-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 32px; text-shadow: 0 0 12px #000; display: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="crosshair">+</div>
    <div id="health-bar"></div>
    <div id="scoreboard"></div>
    <div id="cooldown-bar"><div id="cooldown-fill"></div></div>
    <div id="controls-hint">WASD move | Mouse aim | Click shoot</div>
    <div id="waiting-overlay">Waiting for game to start...</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
