<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Tanks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #hud {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; font-family: monospace; color: #fff;
    }
    #hud > * { pointer-events: auto; }
    #turn-banner {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      font-size: 24px; text-shadow: 0 0 8px #000;
    }
    #controls {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 16px; align-items: end;
    }
    .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .control-group label { font-size: 12px; opacity: 0.7; }
    .control-group input[type=range] { width: 120px; }
    #fire-btn {
      padding: 10px 24px; background: #e44; border: none; color: #fff;
      font-size: 16px; font-family: monospace; cursor: pointer; border-radius: 4px;
    }
    #fire-btn:disabled { opacity: 0.4; cursor: default; }
    #health-bar {
      position: absolute; top: 20px; left: 20px;
      font-size: 14px;
    }
    #scoreboard {
      position: absolute; top: 20px; right: 20px;
      font-size: 14px; text-align: right;
    }
    #waiting-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 32px; text-shadow: 0 0 12px #000; display: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="turn-banner"></div>
    <div id="health-bar"></div>
    <div id="scoreboard"></div>
    <div id="controls">
      <div class="control-group">
        <label>Angle</label>
        <input type="range" id="angle-slider" min="0" max="90" value="45" />
        <span id="angle-val">45°</span>
      </div>
      <div class="control-group">
        <label>Rotation</label>
        <input type="range" id="rotation-slider" min="-180" max="180" value="0" />
        <span id="rotation-val">0°</span>
      </div>
      <div class="control-group">
        <label>Power</label>
        <input type="range" id="power-slider" min="10" max="100" value="50" />
        <span id="power-val">50</span>
      </div>
      <button id="fire-btn">FIRE</button>
    </div>
    <div id="waiting-overlay">Waiting for players...</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
