<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Vibe Tanks</title>
  <!-- Favicons + PWA -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#38761d" />
  <!-- iOS standalone mode: gives fullscreen when launched from the Home Screen. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vibe Tanks" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #hud {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; font-family: monospace; color: #fff;
    }
    #hud > * { pointer-events: auto; }
    #cooldown-ring {
      position: absolute; top: 62%; left: 50%;
      width: 160px; height: 8px; border-radius: 2px;
      background: var(--cd-color, #fa0);
      box-shadow: 0 0 6px rgba(255,170,0,0.5), 0 0 2px #000;
      transform: translate(-50%, -50%) scaleX(var(--cd-scale, 0));
      transform-origin: center center;
      opacity: var(--cd-opacity, 0);
      transition: transform 0.06s linear, opacity 0.2s linear, background 0.08s linear;
      pointer-events: none;
    }
    #health-bar {
      position: absolute; top: 16px; left: 16px;
      width: 200px; height: 18px; border-radius: 3px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.35);
      overflow: hidden; font-size: 12px;
    }
    #health-fill {
      position: absolute; inset: 0; transform-origin: left center;
      transform: scaleX(var(--hp-scale, 1));
      background: var(--hp-color, #4f4);
      transition: transform 0.15s ease-out, background 0.2s linear;
    }
    #health-label {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      font-family: monospace; font-weight: bold;
      color: #fff; text-shadow: 0 0 3px #000, 0 0 3px #000;
      letter-spacing: 1px;
    }
    #scoreboard {
      position: absolute; top: 40px; right: 6px;
      font-size: 14px; text-align: right; text-shadow: 0 0 6px #000;
    }
    #weapon-hud {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      display: flex; flex-wrap: wrap; justify-content: center; gap: 0;
      width: min(440px, calc(100vw - 16px));
      pointer-events: none;
    }
    .weapon-chip {
      width: 32px; height: 32px; padding: 0;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 0; background: rgba(0,0,0,0.55);
      display: inline-flex; align-items: center; justify-content: center;
      position: relative; opacity: 0.8;
    }
    .weapon-chip.selected {
      border-color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.2); opacity: 1;
    }
    .weapon-icon {
      width: 22px; height: 22px; display: block;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.6));
    }
    .weapon-chip .weapon-slot {
      position: absolute; top: 1px; left: 3px;
      font-family: monospace; font-size: 9px;
      color: rgba(255,255,255,0.75);
      text-shadow: 0 0 2px #000;
      pointer-events: none;
    }
    body.mobile .weapon-chip { width: 44px; height: 44px; }
    body.mobile .weapon-icon { width: 30px; height: 30px; }
    #controls-hint {
      position: absolute; bottom: 74px; left: 50%; transform: translateX(-50%);
      font-size: 12px; opacity: 0.5; pointer-events: none;
    }
    #waiting-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 32px; text-shadow: 0 0 12px #000; display: none;
      pointer-events: none;
    }
    #login-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, #0a0d1a 0%, #141a2d 60%, #1e2838 100%);
      font-family: monospace; color: #fff; z-index: 10;
      overflow: hidden;
    }
    #tank-preview {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block; background: transparent;
      pointer-events: none;
    }
    #login-title {
      position: absolute; top: 46px; left: 50%;
      transform: translateX(-50%);
      font-family: monospace; font-weight: bold;
      font-size: 56px; letter-spacing: 16px; color: #fff;
      text-shadow: 0 0 22px rgba(120, 180, 255, 0.55), 0 4px 10px rgba(0, 0, 0, 0.85);
      pointer-events: none; z-index: 2;
    }
    #login-panel {
      position: absolute; right: 64px; top: 50%;
      transform: translateY(-50%);
      background: rgba(12, 15, 26, 0.72);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 28px 32px; border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      width: 320px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.65);
      z-index: 2;
    }
    #login-panel label {
      font-size: 12px; opacity: 0.7; display: block;
      margin: 0 0 6px; letter-spacing: 2px;
    }
    #login-panel label:not(:first-child) { margin-top: 18px; }
    #login-panel input[type=text] {
      width: 100%; padding: 10px 12px; font-family: inherit; font-size: 15px;
      background: rgba(6, 8, 14, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.18); border-radius: 4px;
      color: #fff; outline: none;
    }
    #login-panel input[type=text]:focus { border-color: rgba(120, 180, 255, 0.7); }
    #color-swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
    .color-swatch {
      width: 100%; aspect-ratio: 1 / 1; border-radius: 4px; cursor: pointer;
      border: 2px solid transparent; transition: transform 0.08s;
    }
    .color-swatch:hover { transform: scale(1.08); }
    .color-swatch.selected { border-color: #fff; }
    #login-panel button {
      margin-top: 24px; width: 100%; padding: 12px; font-family: inherit; font-size: 14px;
      background: #4f4; color: #000; border: 0; border-radius: 4px; cursor: pointer;
      font-weight: bold; letter-spacing: 2px;
    }
    #login-panel button:hover { background: #6f6; }
    @media (max-width: 720px) {
      #login-title { font-size: 30px; letter-spacing: 6px; top: 22px; }
      #login-panel {
        right: 16px; left: 16px; width: auto;
        top: auto; bottom: 22px; transform: none;
        padding: 20px 22px;
      }
    }
    /* Damage popups — stacked animation layers so rise + shake + flicker
       don't stomp each other's transform property. */
    .damage-popup-rise {
      position: absolute; left: 0; top: 0;
      animation-name: dmg-rise; animation-timing-function: ease-out;
      animation-fill-mode: forwards; will-change: transform, opacity;
      transform: translate(-50%, 0);
    }
    @keyframes dmg-rise {
      0%   { transform: translate(-50%, 0)     scale(0.55); opacity: 0; }
      10%  { transform: translate(-50%, -12px) scale(1.25); opacity: 1; }
      22%  { transform: translate(-50%, -20px) scale(1.0);  opacity: 1; }
      70%  { transform: translate(-50%, -60px) scale(1.0);  opacity: 1; }
      100% { transform: translate(-50%, -95px) scale(0.95); opacity: 0; }
    }
    .damage-popup-shake { display: inline-flex; align-items: center; gap: 4px; }
    .damage-popup-shake.active { animation: dmg-shake 0.09s linear infinite; }
    @keyframes dmg-shake {
      0%   { transform: translate(0, 0)    rotate(-2deg); }
      25%  { transform: translate(2px, -1px) rotate(2deg); }
      50%  { transform: translate(-2px, 1px) rotate(-1deg); }
      75%  { transform: translate(1px, 2px) rotate(2deg); }
      100% { transform: translate(-1px, -1px) rotate(-2deg); }
    }
    .damage-popup-text {
      font-family: monospace; font-weight: bold; white-space: nowrap;
      text-shadow: 0 0 3px #000, 1px 1px 0 #000;
    }
    .damage-popup-text.glow { animation: dmg-glow 0.35s ease-in-out infinite alternate; }
    @keyframes dmg-glow {
      from { filter: brightness(1)   drop-shadow(0 0 4px currentColor); }
      to   { filter: brightness(1.5) drop-shadow(0 0 14px currentColor); }
    }
    .damage-popup-fire {
      display: inline-block;
      animation: dmg-fire-flicker 0.18s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 6px #ff7722);
    }
    @keyframes dmg-fire-flicker {
      0%   { transform: translateY(0)    scale(1)   rotate(-6deg); opacity: 0.85; }
      100% { transform: translateY(-2px) scale(1.15) rotate(8deg); opacity: 1; }
    }
    
    /* Special Event Banner */
    @keyframes banner-pop {
      0% { opacity: 0; transform: translate(-50%, -40px) scale(0.9); }
      10% { opacity: 1; transform: translate(-50%, 0) scale(1.1); filter: brightness(1.5); }
      20% { opacity: 1; transform: translate(-50%, -5px) scale(1.0); filter: brightness(1); }
      80% { opacity: 1; transform: translate(-50%, 0) scale(1.0); }
      100% { opacity: 0; transform: translate(-50%, -20px) scale(0.95); }
    }
    #special-event-banner {
      position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
      font-family: monospace; font-weight: bold; font-size: 24px; letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff; text-shadow: 0 0 8px #000, 0 0 16px var(--event-color, #f44);
      opacity: 0; pointer-events: none; z-index: 15;
    }
    #special-event-banner.show {
      animation: banner-pop 4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .tank-name-label {
      font-family: monospace; font-size: 12px; color: #fff;
      text-shadow: 0 0 4px #000, 0 0 4px #000;
      padding: 2px 6px; border-radius: 3px; background: rgba(0,0,0,0.35);
      pointer-events: none; white-space: nowrap;
    }
    /* Death overlay — letterbox layout: opaque bands top+bottom, the
       middle of the screen stays transparent so the killcam is visible
       through the overlay. */
    #death-overlay {
      position: fixed; inset: 0; display: none; z-index: 20;
      pointer-events: none; /* only the respawn button re-enables pointer events */
      animation: death-fade 0.6s ease-out;
      font-family: 'Times New Roman', serif; color: #9a1313;
      text-shadow: 0 0 18px rgba(154,19,19,0.6), 0 0 4px #000;
    }
    @keyframes death-fade { from { opacity: 0; } to { opacity: 1; } }
    #death-top, #death-bottom {
      position: absolute; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    #death-top {
      top: 0; padding: 28px 16px 72px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0) 100%);
    }
    #death-bottom {
      bottom: 0; padding: 72px 16px 72px;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0) 100%);
    }
    #death-title {
      font-size: 64px; letter-spacing: 14px; font-style: italic;
      font-weight: bold; border-top: 1px solid rgba(154,19,19,0.5);
      border-bottom: 1px solid rgba(154,19,19,0.5); padding: 14px 48px;
    }
    #death-killer {
      font-family: monospace; font-size: 16px; letter-spacing: 3px;
      color: rgba(255,255,255,0.85); text-shadow: 0 0 4px #000; min-height: 20px;
    }
    #death-killer .death-killer-name { font-weight: bold; }
    #death-timer {
      font-family: monospace; font-size: 18px;
      color: rgba(255,255,255,0.7); letter-spacing: 2px; text-shadow: 0 0 4px #000;
      min-height: 22px;
    }
    #death-respawn {
      padding: 14px 36px; font-family: inherit; font-size: 22px;
      letter-spacing: 6px; font-style: italic; background: transparent;
      color: #9a1313; border: 1px solid rgba(154,19,19,0.6); cursor: pointer;
      text-shadow: 0 0 6px rgba(154,19,19,0.6); transition: all 0.15s;
      pointer-events: auto; display: flex; flex-direction: column; align-items: center;
    }
    #death-respawn .death-respawn-hint {
      font-size: 11px; letter-spacing: 4px; font-style: normal;
      opacity: 0.55; margin-top: 4px;
    }
    #death-respawn:disabled { opacity: 0.25; cursor: default; }
    #death-respawn:not(:disabled):hover {
      background: rgba(154,19,19,0.15); color: #c22;
      border-color: rgba(194,34,34,0.9);
    }
    /* Kill Overlay — same letterbox style as death, but with a vibrant
       cyan/white "victory" palette. */
    #kill-overlay {
      position: fixed; inset: 0; display: none; z-index: 25;
      pointer-events: none;
      font-family: 'Times New Roman', serif; color: #4af;
      text-shadow: 0 0 18px rgba(64,170,255,0.6), 0 0 4px #000;
    }
    #kill-top, #kill-bottom {
      position: absolute; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    #kill-top {
      top: 0; padding: 48px 16px 64px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0) 100%);
      animation: kill-slide-down 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    }
    #kill-bottom {
      bottom: 0; padding: 64px 16px 48px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0) 100%);
      animation: kill-slide-up 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    }
    @keyframes kill-slide-down { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    @keyframes kill-slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes kill-fade-out { from { opacity: 1; } to { opacity: 0; } }
    #kill-overlay.fade-out { animation: kill-fade-out 0.4s ease-in forwards; }

    #kill-title {
      font-size: 52px; letter-spacing: 12px; font-style: italic;
      font-weight: bold; border-top: 1px solid rgba(64,170,255,0.5);
      border-bottom: 1px solid rgba(64,170,255,0.5); padding: 12px 40px;
      color: #fff; text-shadow: 0 0 20px #4af, 0 0 4px #000;
    }
    #kill-victim .kill-victim-name { font-weight: bold; }

    /* Leaderboard Overlay — full screen table style with a premium "post-match" feel */
    #leaderboard-overlay {
      position: fixed; inset: 0; display: none; z-index: 30;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-family: 'Times New Roman', serif;
    }
    #leaderboard-title {
      font-size: 52px; letter-spacing: 16px; font-weight: bold;
      text-transform: uppercase; margin-bottom: 40px;
      text-shadow: 0 0 20px rgba(255,215,0,0.4);
      color: #ffd700;
    }
    #leaderboard-table {
      width: 80%; max-width: 800px;
      border-collapse: collapse; font-family: monospace;
      font-size: 18px;
    }
    #leaderboard-table th {
      text-align: left; padding: 12px; border-bottom: 2px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 2px;
      font-size: 14px;
    }
    #leaderboard-table td {
      padding: 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    #leaderboard-table tr:first-child { color: #ffd700; font-size: 24px; }
    #leaderboard-table tr:first-child td { border-bottom: 2px solid rgba(255,215,0,0.3); }
    
    .lb-rank { width: 60px; opacity: 0.5; }
    .lb-name { font-weight: bold; letter-spacing: 1px; }
    .lb-kills { color: #4af; text-align: center; width: 80px; }
    .lb-deaths { color: #f44; text-align: center; width: 80px; }
    .lb-score { color: #fff; text-align: right; width: 100px; font-weight: bold; }
    
    #leaderboard-timer {
      margin-top: 40px; font-size: 14px; opacity: 0.5;
      letter-spacing: 4px; text-transform: uppercase;
    }
    /* Fullscreen toggle — always visible, tiny, top-right. z-index must
       sit above login (10) and death (20) overlays. */
    #fullscreen-btn {
      position: fixed; top: 0; right: 0; width: 32px; height: 32px;
      background: rgba(0,0,0,0.55); color: #fff; border: 1px solid rgba(255,255,255,0.35);
      border-radius: 0; font-size: 18px; cursor: pointer; padding: 0; line-height: 1;
      z-index: 30; font-family: sans-serif;
    }
    #fullscreen-btn:hover { background: rgba(0,0,0,0.75); }
    #ios-fs-hint {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center; z-index: 40;
      font-family: monospace; color: #fff;
    }
    #ios-fs-hint .ios-fs-panel {
      background: #141418; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; padding: 24px 26px; max-width: 300px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    #ios-fs-hint h2 { font-size: 18px; margin-bottom: 12px; letter-spacing: 1px; }
    #ios-fs-hint p { font-size: 13px; opacity: 0.85; margin: 6px 0; }
    #ios-fs-hint ol { font-size: 13px; margin: 10px 0 4px 20px; line-height: 1.6; }
    #ios-fs-hint .ios-fs-share { color: #4af; font-weight: bold; }
    #ios-fs-hint button {
      margin-top: 14px; width: 100%; padding: 8px; font-family: inherit;
      background: #4f4; color: #000; border: 0; border-radius: 4px; cursor: pointer;
      font-weight: bold; letter-spacing: 1px;
    }
    #minimap {
      position: fixed; bottom: 0; right: 0;
      width: 180px; height: 180px; border-radius: 0;
      pointer-events: none; z-index: 5;
      box-shadow: 0 0 12px rgba(0,0,0,0.5);
    }
    body.mobile #minimap {
      width: 120px; height: 120px;
      top: 56px; left: 12px; right: auto; bottom: auto;
    }
    /* Mobile overlay controls — hidden by default, shown when body has .mobile */
    #mobile-controls { display: none; position: fixed; inset: 0; pointer-events: none; z-index: 4; }
    body.mobile #mobile-controls { display: block; }
    body.mobile #controls-hint { display: none; }
    body.mobile { touch-action: none; -webkit-user-select: none; user-select: none; }
    body.mobile #weapon-hud { pointer-events: auto; bottom: 0; }
    #mc-joystick-base {
      position: absolute; left: 32px; bottom: 40px;
      width: 140px; height: 140px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.25);
      pointer-events: auto; touch-action: none;
    }
    #mc-joystick-knob {
      position: absolute; top: 50%; left: 50%; margin: -28px 0 0 -28px;
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(255,255,255,0.35); border: 2px solid rgba(255,255,255,0.6);
      pointer-events: none; transition: transform 0.05s linear;
    }
    #mc-aim-bar {
      position: absolute; right: 40px; bottom: 40px;
      width: 80px; height: 260px; border-radius: 40px;
      background: rgba(154,19,19,0.18); border: 2px solid rgba(255,120,120,0.45);
      pointer-events: auto; touch-action: none; overflow: hidden;
    }
    #mc-aim-bar.active { border-color: rgba(255,180,180,0.9); }
    #mc-aim-bar-fill {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to top, #ff7744, #ffcc55);
      height: 50%;
      transition: height 0.05s linear;
      opacity: 0.55;
    }
    #mc-aim-bar-knob {
      position: absolute; top: 50%; left: 50%; margin: -20px 0 0 -20px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,220,180,0.92); border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 0 0 8px rgba(255,120,60,0.6);
      pointer-events: none; transition: transform 0.05s linear;
    }
    #mc-aim-bar-label {
      position: absolute; top: 8px; left: 0; right: 0; text-align: center;
      color: rgba(255,230,230,0.75); font-family: monospace; font-size: 10px;
      letter-spacing: 2px; pointer-events: none; user-select: none;
    }
    /* Hitmarker & Hit Flash */
    #hit-flash {
      position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      background: white; opacity: 0;
    }

    #hit-flash.active { animation: hit-flash-anim 0.15s ease-out; }
    @keyframes hit-flash-anim {
      0% { opacity: 0.8; background: rgba(255, 255, 255, 1); filter: brightness(2) contrast(1.5); }
      100% { opacity: 0; background: transparent; }
    }


    #hit-marker {
      position: fixed; top: 50%; left: 50%; width: 80px; height: 80px;
      transform: translate(-50%, -50%) scale(0.5);
      pointer-events: none; opacity: 0; z-index: 9999;
    }


    #hit-marker.active { animation: hit-marker-anim 0.5s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    @keyframes hit-marker-anim {
      0% { transform: translate(-50%, -50%) scale(0.4) rotate(-15deg); opacity: 1; }
      20% { transform: translate(-50%, -50%) scale(1.5) rotate(10deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.2) rotate(0deg); opacity: 0; }
    }


    .hit-line {
      position: absolute; background: #fff; width: 3px; height: 18px;
      box-shadow: 0 0 8px rgba(255,255,255,1);
    }

    .hit-line:nth-child(1) { top: 0; left: 0; transform: rotate(45deg); transform-origin: top left; }
    .hit-line:nth-child(2) { top: 0; right: 0; transform: rotate(-45deg); transform-origin: top right; }
    .hit-line:nth-child(3) { bottom: 0; left: 0; transform: rotate(-45deg); transform-origin: bottom left; }
    .hit-line:nth-child(4) { bottom: 0; right: 0; transform: rotate(45deg); transform-origin: bottom right; }
    #hit-marker.kill .hit-line { background: #ff3333; box-shadow: 0 0 6px rgba(255,51,51,0.9); }
    .hit-particle {
      position: absolute; width: 6px; height: 6px; border-radius: 50%;
      background: #fff; pointer-events: none; opacity: 0; z-index: 999;
      box-shadow: 0 0 6px #fff;
    }
    .hit-particle.active { animation: hit-particle-anim 0.5s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }
    @keyframes hit-particle-anim {
      0% { transform: translate(0, 0) scale(1.5); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* ── Left-side stat bars (shield above boost) ── */
    #left-bars {
      position: absolute; bottom: 74px; left: 12px;
      display: flex; flex-direction: column; gap: 7px;
      pointer-events: none;
    }
    #shield-wrap, #turbo-wrap {
      display: flex; flex-direction: row; align-items: center; gap: 8px;
    }
    #shield-label, #turbo-label {
      font-family: monospace; font-size: 9px; letter-spacing: 2px;
      color: rgba(255,255,255,0.7); text-shadow: 0 0 6px #000, 0 1px 2px #000;
      width: 38px; text-align: right; flex-shrink: 0;
    }
    #shield-track, #turbo-track {
      width: 148px; height: 9px; border-radius: 5px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.7);
      overflow: hidden; flex-shrink: 0;
    }
    #shield-bar {
      height: 100%; border-radius: 5px;
      transform-origin: left center;
      transform: scaleX(var(--sh-scale, 1));
      background: linear-gradient(to right, #1a5fff, #00d4ff);
      box-shadow: 0 0 8px rgba(40,160,255,0.7);
      transition: transform 0.12s linear, box-shadow 0.15s linear;
    }
    #shield-bar.active {
      box-shadow: 0 0 16px rgba(80,210,255,1), 0 0 5px #aef;
      animation: shield-active-pulse 1.2s ease-in-out infinite alternate;
    }
    @keyframes shield-active-pulse {
      from { opacity: 0.82; }
      to   { opacity: 1; }
    }
    #turbo-bar {
      height: 100%; border-radius: 5px;
      transform-origin: left center;
      transform: scaleX(var(--tb-scale, 0));
      background: linear-gradient(to right, #e09000, #ff3300);
      box-shadow: 0 0 8px rgba(255,130,0,0.6);
      transition: transform 0.1s linear, box-shadow 0.15s linear;
    }
    #turbo-bar.active {
      box-shadow: 0 0 16px rgba(255,180,0,0.95), 0 0 5px #ffe;
    }
    #turbo-bar.ready-ping {
      animation: turbo-ready-ping 0.55s ease-out forwards;
    }
    @keyframes turbo-ready-ping {
      0%   { box-shadow: 0 0 8px rgba(255,130,0,0.6); }
      25%  { box-shadow: 0 0 26px rgba(255,220,0,1), 0 0 8px #fff; }
      60%  { box-shadow: 0 0 14px rgba(255,150,0,0.9); }
      100% { box-shadow: 0 0 8px rgba(255,130,0,0.6); }
    }

    /* ── Turbo boost screen VFX ── */
    #turbo-vfx {
      position: fixed; inset: 0; pointer-events: none; z-index: 5;
      box-shadow: inset 0 0 0 rgba(255,140,0,0);
      transition: box-shadow 0.15s ease-out;
    }
    #turbo-vfx.active {
      animation: turbo-vfx-pulse 0.4s ease-in-out infinite alternate;
    }
    @keyframes turbo-vfx-pulse {
      from { box-shadow: inset 0 0 60px rgba(255,160,0,0.30), inset 0 0 20px rgba(255,80,0,0.15); }
      to   { box-shadow: inset 0 0 100px rgba(255,180,0,0.45), inset 0 0 40px rgba(255,100,0,0.25); }
    }


  </style>
</head>
<body>
  <div id="login-overlay">
    <canvas id="tank-preview"></canvas>
    <h1 id="login-title">VIBE TANKS</h1>
    <div id="login-panel">
      <label for="login-name">NAME</label>
      <input id="login-name" type="text" maxlength="16" autocomplete="off" />
      <label>COLOR</label>
      <div id="color-swatches"></div>
      <button id="login-submit">JOIN BATTLE</button>
    </div>
  </div>
  <div id="turbo-vfx"></div>
  <div id="hit-flash"></div>
  <div id="hit-marker">
    <div class="hit-line"></div>
    <div class="hit-line"></div>
    <div class="hit-line"></div>
    <div class="hit-line"></div>
  </div>
  <div id="hud">
    <div id="cooldown-ring"></div>

    <div id="left-bars">
      <div id="shield-wrap" style="display:none">
        <div id="shield-label">SHIELD</div>
        <div id="shield-track"><div id="shield-bar"></div></div>
      </div>
      <div id="turbo-wrap">
        <div id="turbo-label">BOOST</div>
        <div id="turbo-track"><div id="turbo-bar"></div></div>
      </div>
    </div>

    <div id="health-bar"><div id="health-fill"></div><div id="health-label"></div></div>
    <div id="scoreboard"></div>
    <div id="weapon-hud"></div>
    <div id="controls-hint">WASD move | Shift boost | Mouse aim | Left click shoot | Right click shield | 1-9 / 0 switch weapon</div>
    <div id="waiting-overlay">Waiting for game to start...</div>
    <div id="special-event-banner">NEW EVENT: DOUBLE DAMAGE</div>
  </div>
  <div id="kill-overlay">
    <div id="kill-top">
      <div id="kill-title">TANK DESTROYED</div>
      <div id="kill-victim"></div>
    </div>
    <div id="kill-bottom"></div>
  </div>
  <div id="death-overlay">
    <div id="death-top">
      <div id="death-title">YOU DIED</div>
      <div id="death-killer"></div>
    </div>
    <div id="death-bottom">
      <div id="death-timer"></div>
      <button id="death-respawn" disabled>
        <span>SPAWN AGAIN</span>
        <span class="death-respawn-hint">PRESS SPACE</span>
      </button>
    </div>
  </div>
  <div id="leaderboard-overlay">
    <div id="leaderboard-title">Leaderboard</div>
    <table id="leaderboard-table">
      <thead>
        <tr>
          <th class="lb-rank">#</th>
          <th>Player</th>
          <th class="lb-kills">Kills</th>
          <th class="lb-deaths">Deaths</th>
          <th class="lb-score">Score</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <!-- populated by js -->
      </tbody>
    </table>
    <div id="leaderboard-timer">Next round starts in <span id="leaderboard-countdown">10</span>s</div>
  </div>

  <div id="mobile-controls">
    <div id="mc-joystick-base"><div id="mc-joystick-knob"></div></div>
    <div id="mc-aim-bar">
      <div id="mc-aim-bar-fill"></div>
      <div id="mc-aim-bar-knob"></div>
      <div id="mc-aim-bar-label">ARC</div>
    </div>
  </div>
  <button id="fullscreen-btn" type="button" title="Enter fullscreen">⤢</button>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
