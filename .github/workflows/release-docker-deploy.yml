name: release-docker-deploy

on:
  push:
    branches: [release]
  workflow_dispatch:

concurrency:
  group: deploy-release
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    environment: deploy
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      DEPLOY_DIR: /opt/vibe-tanks
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare server image metadata
        id: server-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vibe-tanks-server
          tags: |
            type=raw,value=release
            type=sha,prefix=sha-

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server-runtime
          push: true
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}

      - name: Prepare web image metadata
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vibe-tanks-web
          tags: |
            type=raw,value=release
            type=sha,prefix=sha-

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web-runtime
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}

      - name: Configure SSH access
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync deploy files to VPS
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "install -m 755 -d '$DEPLOY_DIR'"
          scp -P "$VPS_PORT" docker-compose.yml Caddyfile "$VPS_USER@$VPS_HOST:$DEPLOY_DIR/"
          scp -P "$VPS_PORT" scripts/deploy-docker.sh "$VPS_USER@$VPS_HOST:$DEPLOY_DIR/deploy-docker.sh"

      - name: Deploy latest release images on VPS
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "chmod +x '$DEPLOY_DIR/deploy-docker.sh' && DEPLOY_DIR='$DEPLOY_DIR' '$DEPLOY_DIR/deploy-docker.sh'"
